<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solid Sync</title>
    <link rel="stylesheet" href="static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Solid Sync</p>
          <h1>Sync to your Solid pod.</h1>
        </div>
      </section>

      <div class="page-status" id="page-status" hidden></div>

      <section class="grid">
        <div class="editor-stack">
          <article class="card" data-section="settings">
            <div class="card-head">
              <div>
                <p class="card-kicker">Solid Connection</p>
                <button class="section-toggle" data-section-toggle type="button" aria-expanded="true">
                  <span class="toggle-indicator" aria-hidden="true">-</span>
                  <span>Stored once for all profiles</span>
                </button>
              </div>
            </div>

            <div class="card-body" data-section-body>
              <form id="settings-form">
                <label>
                  <span>OIDC issuer URL</span>
                  <input id="settings_oidc_url" name="oidc_url" type="url" placeholder="https://issuer.example" required />
                </label>

                <label>
                  <span>POD URL</span>
                  <input id="settings_pod_url" name="pod_url" type="url" placeholder="https://pod.example/user" required />
                </label>

                <label>
                  <span>Client token</span>
                  <input id="settings_client_token" name="client_token" type="text" required />
                </label>

                <label>
                  <span>Client secret</span>
                  <input id="settings_client_secret" name="client_secret" type="password" required />
                </label>

                <div class="actions">
                  <button class="primary" type="submit">Save Solid settings</button>
                </div>
              </form>
            </div>
          </article>

          <article class="card form-card" data-section="profile-form">
            <div class="card-head">
              <div>
                <p class="card-kicker">Station Profile</p>
                <button class="section-toggle" data-section-toggle type="button" aria-expanded="true">
                  <span class="toggle-indicator" aria-hidden="true">-</span>
                  <span id="form-title">New profile</span>
                </button>
              </div>
            </div>

            <div class="card-body" data-section-body>
              <form id="profile-form">
                <label>
                  <span>Name</span>
                  <input id="name" name="name" type="text" placeholder="Garden weather station" required />
                </label>

                <label>
                  <span>Resource path</span>
                  <input id="resource_path" name="resource_path" type="text" placeholder="weather-stations/garden.json" required />
                  <small class="helper">New snapshots are appended to this JSON file.</small>
                </label>

                <div class="measurements-block">
                  <div class="section-head">
                    <div>
                      <p class="card-kicker">Measurements</p>
                      <h3>Map multiple entities into one resource</h3>
                    </div>
                    <div class="actions">
                      <button class="ghost" type="button" id="add-measurement">Add measurement</button>
                      <button class="ghost" type="button" id="refresh-entities">Refresh entities</button>
                    </div>
                  </div>

                  <div id="measurement-list" class="measurement-list"></div>
                </div>

                <div class="actions">
                  <button class="primary" type="submit" id="submit-button">Save profile</button>
                </div>
              </form>
            </div>
          </article>
        </div>

        <article class="card profiles-card" data-section="profiles">
          <div class="card-head">
            <div>
              <p class="card-kicker">Profiles</p>
              <button class="section-toggle" data-section-toggle type="button" aria-expanded="true">
                <span class="toggle-indicator" aria-hidden="true">-</span>
                <span>Station snapshots</span>
              </button>
            </div>
            <span class="count" id="profile-count">0</span>
          </div>

          <div class="card-body" data-section-body>
            <div class="profile-list" id="profile-list">
              <p class="empty">No profiles configured yet.</p>
            </div>
          </div>
        </article>
      </section>
    </main>

    <template id="measurement-template">
      <div class="measurement-row">
        <label>
          <span>Field key</span>
          <input class="measurement-key" type="text" placeholder="temperature" required />
        </label>
        <label class="measurement-entity-wrap">
          <span>Entity</span>
          <select class="measurement-entity" required></select>
        </label>
        <button class="danger measurement-remove" type="button">Remove</button>
      </div>
    </template>

    <template id="profile-template">
      <article class="profile-card">
        <div class="profile-top">
          <div>
            <h3 class="profile-name"></h3>
            <p class="profile-resource"></p>
          </div>
        </div>

        <div class="chip-list profile-measurements"></div>

        <dl class="profile-meta">
          <div>
            <dt>Last file</dt>
            <dd class="profile-last-resource"></dd>
          </div>
          <div>
            <dt>Last sync</dt>
            <dd class="profile-last-sync"></dd>
          </div>
          <div>
            <dt>Last error</dt>
            <dd class="profile-last-error"></dd>
          </div>
        </dl>

        <div class="profile-actions">
          <button class="ghost action-test" type="button">Test now</button>
          <button class="danger action-delete" type="button">Delete</button>
        </div>
      </article>
    </template>

    <script src="static/app.js" type="module"></script>
  </body>
</html>
